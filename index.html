<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLMC鎌ヶ谷BASEポータル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text:    #1E293B;
      --muted:   #64748B;
      --border:  #E2E8F0;
      --bg:      #F1F5F9;
      --card:    #FFFFFF;
      --radius:  12px;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--text);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 56px 24px 40px;
    }
    .hero-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--muted);
    }

    /* ─── GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 80px;
      width: 100%;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow 0.18s, transform 0.15s;
      border-top: 4px solid var(--accent);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      transform: translateY(-3px);
    }
    .card::after {
      content: '→';
      position: absolute;
      bottom: 22px;
      right: 22px;
      font-size: 18px;
      color: var(--accent);
      opacity: 0.6;
      transition: opacity 0.15s, transform 0.15s;
    }
    .card:hover::after {
      opacity: 1;
      transform: translateX(3px);
    }

    /* card variants */
    .card--apo    { --accent: #2563EB; }
    .card--round  { --accent: #10B981; }
    .card--event  { --accent: #F97316; }

    .card-icon {
      font-size: 36px;
      line-height: 1;
    }
    .card-name {
      font-size: 18px;
      font-weight: 700;
    }
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    /* ─── FOOTER ─── */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .hero-title { font-size: 22px; }
      .grid { gap: 14px; padding: 0 16px 60px; }
      .card { padding: 22px 18px 20px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">SLMC鎌ヶ谷BASE ポータル</span>
</header>

<div class="hero">
  <h1 class="hero-title">ツール一覧</h1>
  <p class="hero-sub">ツールを選択してください</p>
</div>

<div class="grid">

  <a class="card card--apo" href="https://keke3331-bit.github.io/apo-dashboard/index.html">
    <div class="card-icon">📊</div>
    <div class="card-name">アポ集計</div>
    <div class="card-desc">プランナーごとのアポイント・来館数・見込みアセットをリアルタイムで集計・可視化します。</div>
  </a>

  <a class="card card--round" href="https://keke3331-bit.github.io/round-manager/index.html">
    <div class="card-icon">🚗</div>
    <div class="card-name">ラウンド管理</div>
    <div class="card-desc">社用車の出発・到着・帰還をリアルタイムで追跡。事前予定登録・出発チェックリスト・月次レポート対応。</div>
  </a>

  <a class="card card--event" href="https://keke3331-bit.github.io/event-manager/">
    <div class="card-icon">📅</div>
    <div class="card-name">イベント管理</div>
    <div class="card-desc">イベントごとに親・小・孫タスクを階層管理。担当者・期限・進捗率を設定し全体の進捗を可視化します。</div>
  </a>

</div>

<footer>SLMC鎌ヶ谷BASE ポータル</footer>

</body>
</html>
